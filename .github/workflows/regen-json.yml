name: Regenerar species.json a partir do xlsx

# Roda quando o xlsx de data-raw é atualizado, ou manualmente.
# Commita o species.json atualizado no próprio repo.

on:
  push:
    branches: [main]
    paths:
      - 'data-raw/Brazilian tadpoles database*.xlsx'
      - 'scripts/build_species_json.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Regenerate species.json
        run: python scripts/build_species_json.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain assets/data/species.json)" ]; then
            git add assets/data/species.json
            git commit -m "chore: regenerar species.json a partir do xlsx"
            git push
          else
            echo "Sem mudanças no species.json."
          fi
